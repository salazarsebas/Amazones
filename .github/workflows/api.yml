name: Amazones API

on:
  pull_request:
    branches: [main]
    paths:
      - "services/api/**"
      - ".github/workflows/api.yml"
      - "!services/api/**/*.md"
      - "!services/api/node_modules/**"

concurrency:
  group: api-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run build

      - name: Run tests
        run: bun run test
